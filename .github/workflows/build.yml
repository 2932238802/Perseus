name: Windows Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    name: Build on Windows (MSVC)
    runs-on: windows-latest

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 启用 MSVC 编译环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 自动配置 Qt 6 环境
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qt5compat qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: 检查 Qt 安装内容
        shell: pwsh
        run: |
          qmake -v
          Write-Host "Qt 安装目录: $env:IQTA_TOOLS"

      - name: 配置 CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release

      - name: 编译项目
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: 准备发布目录
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          if (Test-Path "build/Perseus.exe") {
            Copy-Item "build/Perseus.exe" "dist/Perseus.exe"
          }
          elseif (Test-Path "build/Release/Perseus.exe") {
            Copy-Item "build/Release/Perseus.exe" "dist/Perseus.exe"
          }
          else {
            Write-Error "未找到 Perseus.exe"
          }

      - name: 打包 Qt 依赖
        shell: pwsh
        run: |
          windeployqt --release --compiler-runtime --verbose 2 dist/Perseus.exe

      - name: 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: Perseus-Windows-Release
          path: dist/